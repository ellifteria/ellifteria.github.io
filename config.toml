baseURL = "https://elliberes.me"
languageCode = "en-us"
title = "Elli Beres"
theme = "cactus"
copyright = "Elli Beres" # cactus will use title if copyright is not set
# disqusShortname = "example" # Used when comments is enabled. Cactus will use site title if not set
# googleAnalytics = "UA-1234-5"


# summaryLength = 2

# Main menu which appears below site header.
[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "About"
url = "/about"
weight = 2

[[menu.main]]
name = "Digital Garden"
url = "https://elliberes.me/digitalgarden/"
weight = 3

[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = false
    noClasses = true
    style = "dracula"
    tabWidth = 4

[params]

  colortheme = "light" # dark, light, white, or classic
  rss = false # generate rss feed. default value is false
  googleAnalyticsAsync = false # use asynchronous tracking. Synchronous tracking by default
  showAllPostsArchive = false # default

  # Home page settings
  description = """
  ```yaml
    ---
    - name: 'Elli'
        in Greek: 'Έλλη'
        short for: 'Eleftheria'
            in Greek: 'Ελευθερία'
    - pronouns: '(she/her/hers)'
  ```
  """
  aboutMe = """
  ```yaml
    ---
    - position: 'Undergraduate Student Researcher'
        - research_group: 'Xenobot Lab'
            location: 'Northwestern University'
        - research_group: 'Leonard Lab'
            location: 'Northwestern University'
    - education:
        degrees:
            - 'BS in Computer Science'
                institution: 'Northwestern University'
                graduation_date: 'Jun 2025'
            - 'MS in Computer Science'
                institution: 'Northwestern University'
                graduation_date: 'Jun 2025'
    - interested_in:
        - 'machine learning'
        - 'artificial intelligence'
        - 'building embedded and decentralized systems that are'
            - 'safer'
            - 'more secure'
            - 'more sustainable'
            - 'more equitable'
            - 'more accessible'
            - 'more intelligent'
    - supporter_of:
        - 'free and open-source software (FOSS)'
        - 'technological decentralization'
        - 'solarpunk'
  ```
  """
  mainSection = "about" # your main section
  mainSectionTitle = "More about me!"
  
  showAllPostsOnHomePage = false # default
  
  postsOnHomePage = 5 # this option will be ignored if showAllPostsOnHomePage is set to true
  tagsOverview = false # show tags overview by default.
  
  showProjectsList = true # show projects list by default (if projects data file exists).
  projectsUrl = "https://github.com/ellifteria" # title link for projects list
  projectsTitle = "Check out some of my projects here!"
  
  showPublicationsList = true # show projects list by default (if projects data file exists).
  # publicationsUrl = "https://github.com/ellifteria" # title link for projects list
  publicationsTitle = "Here are my publications!"
  paperssSubTitle = "Papers:"
  postersSubTitle = "Posters:"
  
  beliefsDescription = """
  ```yaml
    ---
    - 'love is love'
    - 'trans rights are human rights'
    - 'feminism is for everyone'
    - 'there is no planet B'
    - 'science is real'
    - 'black lives matter'
  ```
  """
  

  # https://gohugo.io/functions/format/#hugo-date-and-time-templating-reference
  dateFormat = "2006-01-02" # default

  # Post page settings
  show_updated = true # default
  showReadTime = true # default

  [params.comments]
    enabled = false # default
    # engine = "cactus_comments" # only disqus, utterances, and cactus_comments is supported
    # [params.comments.utterances]
    #   repo = "<github_username>/<github_reponame>"
    #   label = "hugo-site-name" # you can use however you want to label your name in your repo's issues
    #   theme = "github-light"
    # [params.comments.cactuscomments]
    #   siteName = "your_cactus_comments_sitename" # see https://cactus.chat/ on how to register your site name
    #   #serverUrl = "" # Defaults to https://matrix.cactus.chat:8448 (Cactus Chat public server)
    #   #serverName = "" # Defaults to cactus.chat

  # the value of name should be an valid font awesome icon name (brands type)
  # https://fontawesome.com/icons?d=gallery&s=brands
  [[params.social]]
    name = "github"
    link = "https://github.com/ellifteria"
  [[params.social]]
    name = "mastodon"
    link = "https://fosstodon.org/@ellifteria"
